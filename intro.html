
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Initializing NEMORY...</title>
  <link rel="manifest" href="manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #00ffe1;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .intro-text {
      text-align: center;
      font-size: 1.5rem;
    }
    .intro-text span {
      display: block;
      opacity: 0;
      animation: fadeIn 6s linear forwards;
    }
    .intro-text span:nth-child(1) { animation-delay: 0s; }
    .intro-text span:nth-child(2) { animation-delay: 1.5s; }
    .intro-text span:nth-child(3) { animation-delay: 3s; }
    .intro-text span:nth-child(4) { animation-delay: 4.5s; }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <audio id="bootSound" autoplay>
    <source src="startup.mp3" type="audio/mpeg">
  </audio>
  <div class="intro-text">
    <span>BOOTING NEMORY...</span>
    <span>Initializing memory core...</span>
    <span>Decrypting identity...</span>
    <span>Welcome.</span>
  </div>
  <script>
    setTimeout(() => {
      window.location.href = "main.html";
    }, 6000);
  </script>
</body>
</html>
